# Notion Automator Configuration
# Run: python daemon.py

# Your Notion integration token (Settings → Integrations → New integration)
token = "ntn_your_token_here"

# Seconds between polls (applies to all databases)
poll_interval = 60

# Task databases to watch. Each [[databases]] block is one database.
# Flags control which automations are active for that database (absent = disabled).
[[databases]]
id                = "your-database-id-here"
closed_date       = true   # stamp Closed Date on close; clear on reopen (required for recurring tasks)
reopen_count      = true   # increment Reopen Count on reopen (requires closed_date = true to be useful)
due_date_tracking = true   # track Due Date Update Count and First Due Date

# Add more [[databases]] blocks for additional task databases.

# ── Recurring Tasks (optional) ────────────────────────────────────────────────
# Remove or comment out this section to disable recurring task automation.
[recurring_tasks]
enabled = true
definitions_db_id = "your-recurring-definitions-database-id-here"
tasks_db_id = "your-main-tasks-database-id-here"
